<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Proyectos</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #141414; /* estilo Netflix */
      color: #ffffff;
    }

    header {
      padding: 20px 40px;
      background-color: #000000;
      border-bottom: 1px solid #222;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    main {
      padding: 30px 40px;
    }

    /* GRID DE PROYECTOS */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    /* CARTA */
    .card {
      background-color: #1f1f1f;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }

    .card-content {
      padding: 15px;
    }

    .card-content h3 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .card-content p {
      margin: 0;
      font-size: 14px;
      color: #cccccc;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Mis Proyectos</h1>
  </header>

  <main>
    <section class="grid">
      <!-- PROYECTO 1 -->
      <div class="card">
        <img src="https://via.placeholder.com/400x200" alt="Proyecto 1" />
        <div class="card-content">
          <h3>Proyecto 1</h3>
          <p>Descripción breve del proyecto.</p>
        </div>
      </div>

      <!-- PROYECTO 2 -->
      <div class="card">
        <img src="https://via.placeholder.com/400x200" alt="Proyecto 2" />
        <div class="card-content">
          <h3>Proyecto 2</h3>
          <p>Descripción breve del proyecto.</p>
        </div>
      </div>

      <!-- PROYECTO 3 -->
      <div class="card">
        <img src="https://via.placeholder.com/400x200" alt="Proyecto 3" />
        <div class="card-content">
          <h3>Proyecto 3</h3>
          <p>Descripción breve del proyecto.</p>
        </div>
      </div>

      <!-- PROYECTO 4 -->
      <div class="card">
        <img src="https://via.placeholder.com/400x200" alt="Proyecto 4" />
        <div class="card-content">
          <h3>Proyecto 4</h3>
          <p>Descripción breve del proyecto.</p>
        </div>
      </div>
    </section>
  </main>

  <footer>
    © 2025 - Mis proyectos
  </footer>
</body>
</html>
